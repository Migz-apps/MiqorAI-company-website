name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

       Silber- name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Run Build Script
        run: npm run build

      # Automatically find the build folder and normalize it to './deploy_dir'
      - name: Detect and Normalize Build Directory
        run: |
          if [ -d "dist" ]; then
            echo "Found 'dist' directory."
            cp -r dist deploy_dir
          elif [ -d "build" ]; then
            echo "Found 'build' directory."
            cp -r build deploy_dir
          elif [ -d ".output" ]; then
            echo "Found '.output' directory."
            cp -r .output deploy_dir
          elif [ -d "public" ]; then
            echo "Found 'public' directory."
            cp -r public deploy_dir
          else
            echo "Could not find a standard build folder. Creating fallback from root static files."
            mkdir deploy_dir
            cp -r *.html *.js *.css deploy_dir/ 2>/dev/null || true
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Upload the normalized directory
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './deploy_dir'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
