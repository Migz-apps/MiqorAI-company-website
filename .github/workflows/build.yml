name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Upgraded node runner environment to remove deprecation warnings

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Run Build Script
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5 # Upgraded version

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Ensure this matches your framework build directory (e.g., 'dist', 'build', or 'public')

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
